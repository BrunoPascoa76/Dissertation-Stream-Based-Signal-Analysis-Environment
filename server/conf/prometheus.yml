global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'mosquitto'
    static_configs:
      - targets: ['mosquitto-exporter:9100']

  - job_name: 'influxdb'
    metrics_path: /metrics
    static_configs:
      - targets: ['influxdb:8086']